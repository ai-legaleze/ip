baseURL = 'https://ai-legalese.github.io/.github/'  # GitHub Pages URL for org project repo (trailing slash required; adjust if using custom domain)

languageCode = 'en-us'
defaultContentLanguage = 'en'
title = 'AI Legalese'  # Site title (customized for org; e.g., for policies, workflows, or legal docs)

# Theme configuration (if using themes)
theme = 'docsy'

# Enable Hugo's built-in Sass/SCSS preprocessor
enableGitInfo = false
enableEmoji = true
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true

# Site params (customizable variables for your site)
[params]
  # Theme-specific params (for Ananke theme; adjust for your theme)
  background_color_class = "bg-light"  # Lighter theme for professional/docs site
  featured_image = "/images/ai-legalese-logo.svg"  # Path to org logo or featured image
  recent_posts = 5  # Show more recent items for docs/changelogs
  description = "Documentation and resources for the AI Legalese organization on GitHub."
  favicon = "/favicon.ico"  # Org favicon

  # Menu configuration (tailored for org .github repo: e.g., workflows, issues, policies)
  [[params.menu]]
    name = "Workflows"
    url = "/workflows/"
    weight = 1
  [[params.menu]]
    name = "Policies"
    url = "/policies/"
    weight = 2
  [[params.menu]]
    name = "Contributing"
    url = "/contributing/"
    weight = 3
  [[params.menu]]
    name = "About AI Legalese"
    url = "/about/"
    weight = 4

# Organization info (instead of single author)
[author]
  name = "AI Legalese Organization"  # Or use [params.organization] if your theme supports it
  website = "https://ai-legalese.github.com/.github/"
  github = "ai-legalese"

# Taxonomies (useful for tagging docs: e.g., categories for workflows, tags for updates)
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Default section for content (e.g., for doc pages)
# [section _default]
#  images = ['featured-image.jpg']  # Default image for pages

# Build options (overrides for builds)
[build]
  writeStats = true
  # Ignore certain files during build (e.g., if sensitive .github configs)
  ignoreErrors = ['error-missing-variable']

# Optional: Markup settings (for rendering Markdown docs)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allows raw HTML (useful for code snippets in docs)
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = true

# Optional: For generating sitemaps and RSS (good for public org docs)
[outputs]
  home = ["HTML", "RSS", "JSON"]
[mediaTypes]
  [mediaTypes."application/rss+xml"]
    suffixes = ["xml"]
    
